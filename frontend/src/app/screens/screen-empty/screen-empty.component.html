<div class="campaign-list-view">
 <div class="toolbar-row">
  <!-- Dropdown -->
  <div class="toolbar-input select-display">
    <select>
      <option value="">All</option>
      <option value="draft">Draft</option>
      <option value="active">Active</option>
      <option value="completed">Completed</option>
    </select>
    <i class="bi bi-chevron-down"></i>
  </div>

  <!-- Search Input -->
  <div class="toolbar-input search-display">
    <i class="bi bi-search"></i>
    <input type="text" placeholder="Search" />
  </div>
</div>

  <div class="empty-state-wrap">
    <div class="empty-illustration">
      <img src="../../../assets/img/compaign.svg" alt="" width="100%">
    </div>

    <button class="btn btn-primary px-4" type="button" (click)="selectMode.emit()">
     New Campaign
    </button>
  </div>
</div>
