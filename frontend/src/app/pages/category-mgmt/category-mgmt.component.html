<div class="mgmt-container">
  <div class="header">
    <h2>Manage Categories</h2>
    <button class="btn-add" (click)="showModal = true">Add New Category</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of categories">
          <td>{{cat.name}}</td>
          <td>{{cat.description}}</td>
          <td>
            <button class="btn-edit" (click)="editCategory(cat)"><i class="bi bi-pencil"></i></button>
            <button class="btn-delete" (click)="deleteCategory(cat.id!)"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="modal" *ngIf="showModal">
    <div class="modal-content">
      <h3>{{isEditing ? 'Edit' : 'Add'}} Category</h3>
      <form (ngSubmit)="saveCategory()">
        <div class="form-group">
          <label>Name</label>
          <input type="text" [(ngModel)]="newCategory.name" name="name" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea [(ngModel)]="newCategory.description" name="description"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
