<div class="mgmt-container">
  <div class="header">
    <h2>Manage Sub-Categories</h2>
    <button class="btn-add" (click)="showModal = true">Add New Sub-Category</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Parent Category</th>
          <th>Description</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let sub of subCategories">
          <td>{{sub.name}}</td>
          <td>{{sub.category_name}}</td>
          <td>{{sub.description}}</td>
          <td>
            <button class="btn-edit" (click)="editSubCategory(sub)"><i class="bi bi-pencil"></i></button>
            <button class="btn-delete" (click)="deleteSubCategory(sub.id!)"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="modal" *ngIf="showModal">
    <div class="modal-content">
      <h3>{{isEditing ? 'Edit' : 'Add'}} Sub-Category</h3>
      <form (ngSubmit)="saveSubCategory()">
        <div class="form-group">
          <label>Parent Category</label>
          <select [(ngModel)]="newSubCategory.category_id" name="category_id" required>
            <option [value]="0" disabled>Select Category</option>
            <option *ngFor="let cat of categories" [value]="cat.id">{{cat.name}}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Name</label>
          <input type="text" [(ngModel)]="newSubCategory.name" name="name" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea [(ngModel)]="newSubCategory.description" name="description"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
