<header class="content-header">
  <h1>Dashboard Overview</h1>
</header>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon revenue"><i class="bi bi-currency-dollar"></i></div>
    <div class="stat-info">
      <p>Total Revenue</p>
      <h3>{{stats.total_revenue | currency}}</h3>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon orders"><i class="bi bi-cart-check"></i></div>
    <div class="stat-info">
      <p>Total Orders</p>
      <h3>{{stats.total_orders}}</h3>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon products"><i class="bi bi-cup-hot"></i></div>
    <div class="stat-info">
      <p>Products</p>
      <h3>{{stats.total_products}}</h3>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon inventory"><i class="bi bi-stack"></i></div>
    <div class="stat-info">
      <p>Inventory Items</p>
      <h3>{{stats.total_inventory}}</h3>
    </div>
  </div>
</div>

<div class="dashboard-charts">
  <div class="chart-card">
    <h3>Daily Revenue Trend</h3>
    <canvas #salesChart></canvas>
  </div>
</div>
