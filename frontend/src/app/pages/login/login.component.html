<div class="login-container">
  <div class="login-card">
    <h2>Brew & Leaf Admin</h2>
    <p>Sign in to manage your coffee shop</p>
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="credentials.email" required placeholder="brewandleaf&#64;gmail.com">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="credentials.password" required placeholder="Enter password">
      </div>
      
      <div class="error-msg" *ngIf="error">{{error}}</div>
      
      <button type="submit" class="btn-login">Login</button>
    </form>
    
    <div class="back-home">
        <a href="/">Back to Home</a>
    </div>
  </div>
</div>
